appId: org.pdfpreview.app
productName: pdf-preview
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/icon.png
    to: icon.png
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
  mimeTypes:
    - application/pdf
  desktop:
    Name: pdf-preview
    Comment: View and edit PDF files
    Categories: Office;Viewer;
